<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reader</title>
  <link rel="stylesheet" href="reader.css">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <div class="reader-container">
    <div class="reader-header">
      <div class="reader-header-left">
        <button class="reader-nav-btn" onclick="goBack()">← Back</button>
        <div class="reader-title" id="bookTitle"></div>
      </div>

      <div class="reader-header-right">
        <div class="zoom-controls">
          <button onclick="zoomOut()">−</button>
          <button onclick="zoomIn()">+</button>
        </div>

        <button class="reader-mode-btn" id="spreadToggle" onclick="toggleSpreadMode()">
          Two Page
        </button>

        <button class="reader-mode-btn" onclick="setTheme('light')"><span class="bting">🌤️</span></button>
        <button class="reader-mode-btn" onclick="setTheme('night')"><span class="bting">🌚</span></button>
        <button class="reader-mode-btn" onclick="setTheme('sepia')"><span class="bting">📜</span></button>
      </div>
    </div>
    <div class="flexinger">
      <div class="dropdown">
        <button class="customisation-btn" onclick="dropdownHider()">
          Customise the reading
        </button>

        <div class="hider-cont" id="Show">
          <button class="filter-aply" id="aply-none">Default</button>
          <button class="filter-aply" id="aply-soft">Soft</button>
          <button class="filter-aply" id="aply-dark">Dark</button>
          <button class="filter-aply" id="aply-sepia">Sepia</button>
          <button class="filter-aply" id="aply-sharp">Sharp text</button>
          <button class="filter-aply" id="aply-eyecomfort">Eye comfort+</button>
          <button class="filter-aply" id="aply-balanced">Balanced</button>
          <!-- <button class="filter-aply"></button>
          <button class="filter-aply"></button>
          <button class="filter-aply"></button> -->
        </div>
         
      </div>
      <div class="page-counter" id="pageCounter">
        Page <input type="number" id="pageInput" min="1" style="width: 50px; text-align: center;"> of <span id="totalPages">0</span>
      </div>
      <div class="fullscreen-controls">
        <select class="fullscreen-scale-select" id="fullscreenScale" aria-label="Fullscreen page scale">
          <option value="1">1x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
          <option value="full">Full</option>
        </select>
        <button class="fullscreen-mode" id="fullscreener">Full screen Mode</button>
      </div>
    </div>  

    
   <div class="wrap-fullscreen">
   

     <div class="reader-main" id="mainreader">
      <div class="book-view" id="bookView">
        <div class="page-wrapper" id="leftWrapper">
          <canvas id="leftPage" class="page"></canvas>
        </div>

        <div class="page-wrapper" id="rightWrapper">
          <canvas id="rightPage" class="page"></canvas>
        </div>
      </div>

      <div class="page-nav-hitbox left-zone" id="prevPageHitbox" onclick="prevPage()">
        <button class="page-nav-button" id="prevPageButton" type="button" aria-label="Previous page"><svg class="mover-btn" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M199.7 299.8C189.4 312.4 190.2 330.9 201.9 342.6L329.9 470.6C339.1 479.8 352.8 482.5 364.8 477.5C376.8 472.5 384.6 460.9 384.6 447.9L384.6 191.9C384.6 179 376.8 167.3 364.8 162.3C352.8 157.3 339.1 160.1 329.9 169.2L201.9 297.2L199.7 299.6z"/></svg></button>
      </div>
      <div class="page-nav-hitbox right-zone" id="nextPageHitbox" onclick="nextPage()">
        <button class="page-nav-button" id="nextPageButton" type="button" aria-label="Next page"><svg class="mover-btn" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M441.3 299.8C451.5 312.4 450.8 330.9 439.1 342.6L311.1 470.6C301.9 479.8 288.2 482.5 276.2 477.5C264.2 472.5 256.5 460.9 256.5 448L256.5 192C256.5 179.1 264.3 167.4 276.3 162.4C288.3 157.4 302 160.2 311.2 169.3L439.2 297.3L441.4 299.7z"/></svg></button>
      </div>
    </div>

   </div>  
   

    
  </div>

  <script src="reader.js"></script>
</body>
